name: Sync Generated Files

on:
  push:
    branches:
      - master
    paths:
      - anime.csv
      - .github/scripts/sync_generated_files.py
      - .github/templates/LICENSE.template
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-generated-files:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate README and license files
        run: python .github/scripts/sync_generated_files.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md LICENSE_CN LICENSE
          git diff --cached --quiet || git commit -m "docs: sync generated anime list"
          git push
